name: Android Build (NexApp)

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # تم تحديث الإصدار هنا ليتوافق مع متطلبات كاباسيتور الحديثة

      - name: Install Dependencies
        run: npm install

      - name: Fix Permissions and Sync Android
        run: |
          chmod +x node_modules/.bin/cap || true
          node node_modules/@capacitor/cli/bin/capacitor add android || true
          node node_modules/@capacitor/cli/bin/capacitor sync android

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Neon-Retro-Bowling-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk